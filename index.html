      align-items: center;
      margin-top: 20px;
    }

    .button-row button {

    }

        padding: 18px;

      display: block;
      background: #f1f1f1;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      cursor: pointer;
    }

    .option:hover {
      background: #e7e7e7;

    }

    button {
      padding: 12px 20px;
      margin-top: 20px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

    #feedback {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .correct {
      color: green;
    }

    .wrong {
      color: red;
    }

    #result {
      font-size: 24px;
      font-weight: bold;
      margin-top: 25px;
      text-align: center;

</head>

/*
  Question data repair:
  - Adds options when they are missing.
  - Makes answer text use the exact matching option text.
  - Adds a missing answer to the options list when no reasonable match exists.
  - Falls back to a one-button OK acknowledgement card when both are missing.
*/
function normalizeQuestionText(value) {
  return String(value ?? "")
    .trim()
    .replace(/\s+/g, " ")
    .toLowerCase();
}

function findMatchingOption(answer, options) {
  const normalizedAnswer = normalizeQuestionText(answer);

  // First try an exact match that ignores capitalization and extra spaces.
  let match = options.find(option =>
    normalizeQuestionText(option) === normalizedAnswer
  );

  if (match !== undefined) {
    return match;
  }

  // Then handle answers that are shortened versions of a longer option,
  // or longer versions of an existing option.
  match = options.find(option => {
    const normalizedOption = normalizeQuestionText(option);
    return normalizedOption.startsWith(normalizedAnswer) ||
           normalizedAnswer.startsWith(normalizedOption);
  });

  return match;
}

function repairQuestion(question, index) {
  const repaired = { ...question };

  if (!Array.isArray(repaired.options) || repaired.options.length === 0) {
    if (Array.isArray(repaired.answer) && repaired.answer.length > 0) {
      repaired.options = [...repaired.answer];
    } else if (repaired.answer !== undefined && repaired.answer !== null && repaired.answer !== "") {
      repaired.options = [String(repaired.answer)];
    } else {
      repaired.options = ["OK"];
      repaired.answer = "OK";
      repaired.explanation ||= "Acknowledgement question.";
    }
  }

  // Remove invalid/blank options and convert every option to text.
  repaired.options = repaired.options
    .filter(option => option !== undefined && option !== null && String(option).trim() !== "")
    .map(option => String(option));

  if (repaired.options.length === 0) {
    repaired.options = ["OK"];
  }

  if (repaired.answer === undefined || repaired.answer === null || repaired.answer === "") {
    repaired.answer = repaired.options[0];
  }

  if (Array.isArray(repaired.answer)) {
    repaired.answer = repaired.answer.map(answer => {
      const match = findMatchingOption(answer, repaired.options);

      if (match !== undefined) {
        return match;
      }

      const answerText = String(answer);
      repaired.options.push(answerText);
      return answerText;
    });
  } else {
    const match = findMatchingOption(repaired.answer, repaired.options);

    if (match !== undefined) {
      repaired.answer = match;
    } else {
      const answerText = String(repaired.answer);
      repaired.options.push(answerText);
      repaired.answer = answerText;
    }
  }

  return repaired;
}

const repairedQuestions = allQuestions.map(repairQuestion);

// Keep the existing quiz code working even if it reads from allQuestions.
allQuestions.splice(0, allQuestions.length, ...repairedQuestions);

// Development check: any remaining malformed question will be shown in the browser console.
const questionValidationIssues = allQuestions.flatMap((question, index) => {
  const issues = [];

  if (!Array.isArray(question.options) || question.options.length === 0) {
    issues.push(`Question ${index + 1}: missing options`);
  }

  const answers = Array.isArray(question.answer)
    ? question.answer
    : [question.answer];

  answers.forEach(answer => {
    if (!question.options.includes(answer)) {
      issues.push(`Question ${index + 1}: answer does not exactly match an option: ${answer}`);
    }
  });

  return issues;
});

if (questionValidationIssues.length > 0) {
  console.warn("Quiz data issues:", questionValidationIssues);
} else {
  console.info(`Quiz validation passed: ${allQuestions.length} questions are usable.`);
}


const QUESTIONS_PER_RUN = allQuestions.length;
const WRONG_REPLAY_DELAY = 5;

// Questions with `important: true` appear this many EXTRA times per quiz.
// 2 means an important question appears 3 times total.
const IMPORTANT_EXTRA_PLAYS = 2;
let quizSlides = [];
let quizQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let attempted = 0;
let selectedAnswers = [];
let answerChecked = false;

function shuffle(array) {
  const copy = [...array];

  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }

  return copy;
}

function normalizeAnswer(answer) {
  return Array.isArray(answer) ? [...answer].sort() : [answer].sort();
}

function answersMatch(selected, correct) {
  const selectedSorted = [...selected].sort();
  const correctSorted = normalizeAnswer(correct);

  return selectedSorted.length === correctSorted.length &&
    selectedSorted.every((value, index) => value === correctSorted[index]);
}

function formatAnswer(answer) {
  return Array.isArray(answer) ? answer.join(", ") : answer;
}

function getQuestionNumberForSlide(slideIndex) {
  return slideIndex + 1;
}

function buildWeightedQuestionPool(questions) {
  return questions.flatMap(question => {
    const playCount = question.important ? 1 + IMPORTANT_EXTRA_PLAYS : 1;

    return Array.from({ length: playCount }, () => ({
      ...question,
      type: "question"
    }));
  });
}

function startQuiz() {
  quizQuestions = [...allQuestions];
  quizSlides = shuffle(buildWeightedQuestionPool(allQuestions));

  currentQuestionIndex = 0;
  score = 0;
  attempted = 0;
  selectedAnswers = [];
  answerChecked = false;

  document.getElementById("quiz").style.display = "block";
  document.getElementById("result").innerHTML = "";

  showQuestion();
}

function showQuestion() {
  selectedAnswers = [];
  answerChecked = false;

  // Start each new question at the top, while still allowing the whole page
  // to scroll when a question or its answers are long.
  window.scrollTo({ top: 0, behavior: "instant" });

  const current = quizSlides[currentQuestionIndex];

  document.getElementById("feedback").innerHTML = "";
  document.getElementById("actionButton").innerText = "Check Answer";

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";


  const isMulti = Array.isArray(current.answer);
  const questionNumber = getQuestionNumberForSlide(currentQuestionIndex);
  const replayLabel = current.isReplay ? " | Retry Question" : "";

  document.getElementById("progress").innerText =
    `Question ${questionNumber} of ${quizSlides.length} | Attempted: ${attempted} | Score: ${score}/${attempted}${replayLabel}`;

  document.getElementById("question").innerText =
    current.question + (isMulti ? " (Select all that apply)" : "");

  shuffle(current.options).forEach(option => {
    const label = document.createElement("label");
    label.className = "option";

    const input = document.createElement("input");
    input.type = isMulti ? "checkbox" : "radio";
    input.name = "answer";
    input.value = option;

    input.addEventListener("change", function () {
      if (isMulti) {
        if (this.checked) {
          selectedAnswers.push(this.value);
        } else {
          selectedAnswers = selectedAnswers.filter(x => x !== this.value);
        }
      } else {
        selectedAnswers = [this.value];
      }
    });

    label.appendChild(input);
    label.appendChild(document.createTextNode(option));
    optionsDiv.appendChild(label);
  });
}


function scheduleWrongQuestionReplay(question) {
  // Prevent retry questions from adding themselves again forever.
  if (question.isReplay) return;

  const replayQuestion = {
    ...question,
    isReplay: true,
    question: "RETRY: " + question.question
  };

  const insertIndex = Math.min(
    currentQuestionIndex + WRONG_REPLAY_DELAY + 1,
    quizSlides.length
  );

  quizSlides.splice(insertIndex, 0, replayQuestion);
}

function handleButtonClick() {
  const current = quizSlides[currentQuestionIndex];


  if (!answerChecked) {
    checkAnswer();
  } else {
    nextQuestion();
  }
}

function checkAnswer() {
  if (selectedAnswers.length === 0) {
    alert("Pick an answer first.");
    return;
  }

  const current = quizSlides[currentQuestionIndex];
  const feedback = document.getElementById("feedback");

  attempted++;

  if (answersMatch(selectedAnswers, current.answer)) {
    score++;
    feedback.innerHTML = `<span class="correct">Correct ✅</span>${current.explanation ? `<br><br><b>Why:</b> ${current.explanation}` : ""}`;
  } else {
    feedback.innerHTML = `
      <span class="wrong">Incorrect ❌</span><br>
      Right answer: <span class="correct">${formatAnswer(current.answer)}</span>
      ${current.explanation ? `<br><br><b>Why:</b> ${current.explanation}` : ""}
      ${current.incorrectNotes ? `<br><br><b>Why your answer is incorrect:</b> ${current.incorrectNotes[selectedAnswers[0]] || ""}` : ""}
      <br><br><b>Replay:</b> This question will come back in about ${WRONG_REPLAY_DELAY} slides.
    `;

    scheduleWrongQuestionReplay(current);
  }

  answerChecked = true;
  document.getElementById("actionButton").innerText = "Next";
}

function skipQuestion() {
  // Skipped questions do not affect the attempted count or score.
  nextQuestion();
}

function nextQuestion() {
  currentQuestionIndex++;

  if (currentQuestionIndex < quizSlides.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").style.display = "none";

  const percent = attempted === 0 ? 0 : Math.round((score / attempted) * 100);

  document.getElementById("result").innerHTML = `
    Final Score: ${score} / ${attempted} attempted<br>
    Percentage: ${percent}%<br>
    Questions available: ${quizQuestions.length}<br>
    <button onclick="startQuiz()">Restart Random Quiz</button>
  `;
}

function endQuiz() {
  showResult();
}

startQuiz();
</script>
